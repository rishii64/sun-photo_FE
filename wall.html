<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAXTER | Comments Wall</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#eef3ec] text-gray-800 bg-fixed bg-cover bg-center"
    style="background-image: url('./assets/sun_bg2.png');">

    <!-- HEADER -->
    <header class="flex justify-between items-center px-6 md:px-12 py-5 bg-[#df6d00] text-white">
        <div>
            <a href="index.html"><img src="./assets/sun-logo.png" alt="Sun Pharma" class="h-12 object-contain"></a>
        </div>

        <div class="flex gap-3">
            <a href="index.html"
                class="text-sm px-4 py-2 border border-white/50 rounded-lg hover:bg-white hover:text-[#3e6b4f] transition">
                ← Back to Post
            </a>
        </div>
    </header>

    <!-- MAIN -->
    <div class="max-w-6xl mx-auto px-4 md:px-8 py-10 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="space-y-6">
            <div>
                <h2 class="relative inline-block font-semibold text-[#3e6b4f] text-3xl">Comments
                    <span class="absolute -top-1 -right-6 text-sm rotate-12">
                        <img src="./assets/leaf2.png" class="inline-block w-10 h-10 mt-[-24px] ml-[-15px] align-middle object-contain">
                    </span>
                </h2>
                <p class="text-sm text-gray-600 mt-4">
                    See what others are thinking about <br>
                    <span class="text-[#3e6b4f] font-semibold text-green-900">World Environment Day.</span>
                </p>
            </div>

            <div class=" flex flex-col items-center md:items-start bg-white rounded-xl p-5 border shadow-sm">
                <div class="flex items-center gap-10 md:gap-3">
                    <div class="bg-[#e4efe6] px-3 py-2 rounded-full">
                        <i class="fa-regular fa-comment-dots text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-green-800 font-semibold">Total Comments</p>
                        <p id="totalComments" class="text-2xl font-bold text-[#3e6b4f] ml-1">0</p>
                    </div>
                </div>
                <p class="text-xs text-green-800 opacity-70 mt-2">
                    Voices for a greener tomorrow
                </p>
            </div>
        </div>

        <div class="md:col-span-2 space-y-6">
            <div id="postWall" class="space-y-6"> </div>
            <button id="loadMoreBtn"
                class="w-full bg-[#3e6b4f] text-white py-3 rounded-xl hover:opacity-90 transition hidden">
                ⟳ Load More Comments
            </button>
        </div>
    </div>

    <!-- Libraries for Print / Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
